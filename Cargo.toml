[workspace]
resolver = "2"
members = [
    "crates/fc-client",
    "crates/core",
    "crates/proto",
    "crates/guest-agent",
    "crates/cli",
    "crates/mcp",
    "crates/jail",
]

[workspace.package]
version = "0.7.1"
edition = "2021"
license = "Apache-2.0"
repository = ""

[workspace.dependencies]
# Crates may opt in via `dep.workspace = true`. Crate-local deps (with explicit
# versions) are fine for anything not listed here — do NOT edit this file from
# parallel work tracks.
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
clap = { version = "4", features = ["derive"] }
blake3 = "1"
tempfile = "3"
futures = "0.3"
bytes = "1"
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"

isopod-fc = { path = "crates/fc-client" }
isopod-core = { path = "crates/core" }
isopod-proto = { path = "crates/proto" }
